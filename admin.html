<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shield Matrix — Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { background: #020817; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    .gradient-text { background: linear-gradient(135deg,#38bdf8,#00f5d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  </style>
</head>
<body class="text-white min-h-screen">

<!-- LOGIN SCREEN -->
<div id="login-screen" class="min-h-screen flex items-center justify-center">
  <div class="glass rounded-2xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🛡️</div>
      <h1 class="text-xl font-black gradient-text">Shield Matrix Admin</h1>
      <p class="text-slate-500 text-sm mt-1">Enter your admin password</p>
    </div>
    <input id="pwd-input" type="password" placeholder="Admin password"
      class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white mb-4 focus:outline-none focus:border-sky-500" />
    <button onclick="doLogin()" class="w-full py-3 rounded-xl font-bold bg-gradient-to-r from-sky-500 to-cyan-400 text-slate-900">Login</button>
    <p id="login-err" class="text-red-400 text-xs text-center mt-3 hidden">Wrong password</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" class="hidden">
  <nav class="glass border-b border-white/5 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🛡️</span>
      <span class="font-black gradient-text">Shield Matrix Admin</span>
    </div>
    <div class="flex items-center gap-3">
      <a href="/dashboard" class="text-sm text-sky-400 hover:text-sky-300">← Dashboard</a>
      <button onclick="doLogout()" class="text-sm text-slate-500 hover:text-white">Logout</button>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">

    <!-- STATS CARDS -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="glass rounded-2xl p-4 text-center"><div class="text-2xl font-black text-sky-400" id="s-fixtures">—</div><div class="text-xs text-slate-500 mt-1">Total Fixtures</div></div>
      <div class="glass rounded-2xl p-4 text-center"><div class="text-2xl font-black text-emerald-400" id="s-finished">—</div><div class="text-xs text-slate-500 mt-1">Finished</div></div>
      <div class="glass rounded-2xl p-4 text-center"><div class="text-2xl font-black text-yellow-400" id="s-reviews">—</div><div class="text-xs text-slate-500 mt-1">Reviews</div></div>
      <div class="glass rounded-2xl p-4 text-center"><div class="text-2xl font-black text-violet-400" id="s-ads">—</div><div class="text-xs text-slate-500 mt-1">Active Ads</div></div>
    </div>

    <!-- SYNC -->
    <div class="glass rounded-2xl p-6">
      <h2 class="font-bold text-lg mb-4">⚡ Data Sync</h2>
      <div class="flex items-center gap-4">
        <button onclick="triggerSync()" class="px-6 py-2 rounded-xl bg-sky-500 hover:bg-sky-400 font-bold text-sm transition-colors">Sync Now</button>
        <span id="sync-msg" class="text-sm text-slate-400"></span>
      </div>
    </div>

    <!-- REVIEWS -->
    <div class="glass rounded-2xl p-6">
      <h2 class="font-bold text-lg mb-4">⭐ Reviews</h2>
      <div id="reviews-list" class="space-y-3"></div>
    </div>

    <!-- ADS -->
    <div class="glass rounded-2xl p-6">
      <h2 class="font-bold text-lg mb-4">📢 Ad Slots</h2>
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div>
          <label class="text-xs text-slate-400 mb-1 block">Slot Name</label>
          <input id="ad-slot" placeholder="e.g. banner-top"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-sky-500" />
        </div>
        <div>
          <label class="text-xs text-slate-400 mb-1 block">Ad Code (HTML)</label>
          <input id="ad-code" placeholder="<script>...</script>"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-sky-500" />
        </div>
      </div>
      <button onclick="createAd()" class="px-5 py-2 rounded-xl bg-violet-500 hover:bg-violet-400 font-bold text-sm mb-4">Add Ad</button>
      <div id="ads-list" class="space-y-3"></div>
    </div>

  </main>
</div>

<script>
let ADMIN_KEY = '';

// FIX 2 & 3: Escape user-supplied content before injecting into innerHTML
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function doLogin() {
  // FIX 6: Hide error at the start of every login attempt
  document.getElementById('login-err').classList.add('hidden');
  ADMIN_KEY = document.getElementById('pwd-input').value;
  // FIX 5: Error handling on fetch
  fetch('/admin/stats', { headers: { 'x-admin-key': ADMIN_KEY } })
    .then(r => {
      if (r.ok) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        loadAll();
      } else {
        document.getElementById('login-err').classList.remove('hidden');
      }
    })
    .catch(() => {
      document.getElementById('login-err').textContent = 'Connection error. Try again.';
      document.getElementById('login-err').classList.remove('hidden');
    });
}

function doLogout() {
  ADMIN_KEY = '';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('admin-panel').classList.add('hidden');
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function loadAll() { loadStats(); loadReviews(); loadAds(); }

async function loadStats() {
  // FIX 5: Error handling on fetch
  try {
    const r = await fetch('/admin/stats', { headers: { 'x-admin-key': ADMIN_KEY } });
    const d = await r.json();
    document.getElementById('s-fixtures').textContent = d.fixtures?.total ?? '—';
    document.getElementById('s-finished').textContent = d.fixtures?.finished ?? '—';
    document.getElementById('s-reviews').textContent = `${d.reviews?.total ?? '—'} (⭐${d.reviews?.avg_rating ?? '—'})`;
    document.getElementById('s-ads').textContent = `${d.ads?.active ?? '—'}/${d.ads?.total ?? '—'}`;
  } catch (e) {
    console.error('[loadStats] failed:', e);
  }
}

async function triggerSync() {
  const msg = document.getElementById('sync-msg');
  msg.textContent = 'Syncing...';
  // FIX 4: Send admin key header on sync — consistent auth across all calls
  // FIX 5: Error handling on fetch
  try {
    await fetch('/sync', { headers: { 'x-admin-key': ADMIN_KEY } });
    msg.textContent = '✅ Sync triggered!';
    setTimeout(() => { msg.textContent = ''; loadStats(); }, 3000);
  } catch (e) {
    msg.textContent = '❌ Sync failed. Check connection.';
  }
}

async function loadReviews() {
  // FIX 5: Error handling on fetch
  try {
    const r = await fetch('/reviews');
    const d = await r.json();
    const el = document.getElementById('reviews-list');
    if (!d.reviews?.length) {
      el.innerHTML = '<p class="text-slate-500 text-sm">No reviews yet.</p>';
      return;
    }
    // FIX 2: Escape rv.name and rv.text before injecting into innerHTML
    el.innerHTML = d.reviews.map(rv => `
      <div class="glass rounded-xl p-4 flex items-start justify-between gap-4">
        <div>
          <div class="flex items-center gap-2 mb-1">
            <span class="font-bold text-sm">${escHtml(rv.name)}</span>
            <span class="text-yellow-400 text-xs">${'⭐'.repeat(Math.min(rv.rating, 5))}</span>
            <span class="text-slate-600 text-xs">${escHtml(rv.date)}</span>
          </div>
          <p class="text-slate-300 text-sm">${escHtml(rv.text)}</p>
        </div>
        <button onclick="deleteReview(${rv.id})" class="text-red-400 hover:text-red-300 text-xs whitespace-nowrap">Delete</button>
      </div>`).join('');
  } catch (e) {
    console.error('[loadReviews] failed:', e);
    document.getElementById('reviews-list').innerHTML = '<p class="text-red-400 text-sm">Failed to load reviews.</p>';
  }
}

async function deleteReview(id) {
  // FIX 5: Error handling on fetch
  try {
    await fetch(`/reviews/${id}`, { method: 'DELETE', headers: { 'x-admin-key': ADMIN_KEY } });
    loadReviews();
    loadStats();
  } catch (e) {
    console.error('[deleteReview] failed:', e);
  }
}

async function loadAds() {
  // FIX 5: Error handling on fetch
  try {
    const r = await fetch('/ads', { headers: { 'x-admin-key': ADMIN_KEY } });
    const d = await r.json();
    const el = document.getElementById('ads-list');
    if (!d.ads?.length) {
      el.innerHTML = '<p class="text-slate-500 text-sm">No ads yet.</p>';
      return;
    }
    // FIX 3: Escape ad.code and ad.slot for display — raw HTML should not execute in the preview
    el.innerHTML = d.ads.map(ad => `
      <div class="glass rounded-xl p-4 flex items-center justify-between gap-4">
        <div>
          <span class="font-bold text-sm text-sky-400">${escHtml(ad.slot)}</span>
          <span class="ml-3 text-xs px-2 py-0.5 rounded-full ${ad.active ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-500/20 text-slate-400'}">
            ${ad.active ? 'Active' : 'Paused'}
          </span>
          <p class="text-slate-500 text-xs mt-1 truncate max-w-xs">${escHtml(ad.code)}</p>
        </div>
        <div class="flex gap-2">
          <button onclick="toggleAd(${ad.id})" class="text-xs px-3 py-1 rounded-lg bg-white/5 hover:bg-white/10">
            ${ad.active ? 'Pause' : 'Activate'}
          </button>
          <button onclick="deleteAd(${ad.id})" class="text-xs px-3 py-1 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20">Delete</button>
        </div>
      </div>`).join('');
  } catch (e) {
    console.error('[loadAds] failed:', e);
    document.getElementById('ads-list').innerHTML = '<p class="text-red-400 text-sm">Failed to load ads.</p>';
  }
}

async function createAd() {
  const slot = document.getElementById('ad-slot').value.trim();
  const code = document.getElementById('ad-code').value.trim();
  if (!slot || !code) return;
  // FIX 5: Error handling on fetch
  try {
    await fetch('/ads', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: JSON.stringify({ slot, code }),
    });
    document.getElementById('ad-slot').value = '';
    document.getElementById('ad-code').value = '';
    loadAds();
    loadStats();
  } catch (e) {
    console.error('[createAd] failed:', e);
  }
}

async function toggleAd(id) {
  // FIX 5: Error handling on fetch
  try {
    await fetch(`/ads/${id}/toggle`, { method: 'POST', headers: { 'x-admin-key': ADMIN_KEY } });
    loadAds();
    loadStats();
  } catch (e) {
    console.error('[toggleAd] failed:', e);
  }
}

async function deleteAd(id) {
  // FIX 5: Error handling on fetch
  try {
    await fetch(`/ads/${id}`, { method: 'DELETE', headers: { 'x-admin-key': ADMIN_KEY } });
    loadAds();
    loadStats();
  } catch (e) {
    console.error('[deleteAd] failed:', e);
  }
}
</script>
</body>
</html>
