<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shield Matrix — WC2026</title>
<style>
:root {
  --bg:#080d18; --surface:#0f1624; --card:#161f30; --border:#1e2d45;
  --accent:#3b82f6; --green:#10b981; --amber:#f59e0b; --red:#ef4444;
  --text:#f1f5f9; --muted:#64748b; --sub:#94a3b8;
  --radius:12px; --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;padding-bottom:80px}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.sync-btn{background:var(--card);border:1px solid var(--border);color:var(--sub);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer}
.sync-btn:active{opacity:.7}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;margin-right:5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;background:none;border:none;color:var(--muted);font-size:10px;font-weight:500;transition:color .2s}
.bnav-btn.active{color:var(--accent)}
.bnav-btn svg{width:22px;height:22px}

/* MAIN */
.main{padding:12px;max-width:560px;margin:0 auto}
.section{display:none}.section.active{display:block}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.sec-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:16px 0 8px;padding-left:2px}
.sec-label:first-child{margin-top:0}

/* MATCH CARD */
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.mc:active{border-color:var(--accent)}
.mc-meta{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.b-group{background:#1e2d45;color:var(--accent)}
.b-live{background:#1a3320;color:var(--green)}
.b-done{background:#1e2918;color:#6ee7b7}
.b-upcoming{background:#1e2540;color:#93c5fd}
.mc-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:12px}
.tn{font-size:15px;font-weight:700;line-height:1.3}
.tn-h{text-align:left}.tn-a{text-align:right}
.score{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 14px;text-align:center;min-width:64px}
.score-ft{font-size:20px;font-weight:800}
.score-ht{font-size:10px;color:var(--muted);margin-top:1px}
.vs{color:var(--muted);font-size:12px;font-weight:600}

/* PROB BARS */
.bars{margin-bottom:10px}
.bar-labels{display:flex;justify-content:space-between;margin-bottom:5px}
.bl-pct{font-size:13px;font-weight:700}
.bl-lbl{font-size:11px;color:var(--muted)}
.bar-track{height:7px;background:var(--border);border-radius:4px;display:flex;overflow:hidden;gap:2px}
.bs{height:100%;border-radius:4px;transition:width .6s}
.bs-h{background:var(--accent)}.bs-d{background:var(--amber)}.bs-a{background:var(--red)}

/* MARKETS */
.mkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.mkt{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px}
.mkt-l{font-size:11px;color:var(--muted);margin-bottom:2px}
.mkt-v{font-size:16px;font-weight:700}
.hi{color:var(--green)}.med{color:var(--amber)}.lo{color:var(--red)}

/* BEST BET */
.bestbet{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(16,185,129,.08));border:1px solid rgba(59,130,246,.3);border-radius:var(--radius-sm);padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.bb-label{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.05em;margin-bottom:2px}
.bb-pick{font-size:14px;font-weight:700}
.bb-pct{font-size:12px;color:var(--sub);margin-top:2px}
.conf{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.HIGH{background:#1a3320;color:var(--green)}
.MEDIUM{background:#3a2a08;color:var(--amber)}
.LOW{background:#3a1515;color:var(--red)}

/* SCORELINES */
.sclines{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.scl{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 9px;text-align:center}
.scl-s{font-size:13px;font-weight:700;display:block}
.scl-p{font-size:10px;color:var(--muted)}

/* STANDINGS TABLE */
.stbl{width:100%;border-collapse:collapse;font-size:13px}
.stbl th{color:var(--muted);font-size:10px;font-weight:600;padding:6px 6px;text-align:left;border-bottom:1px solid var(--border)}
.stbl th:not(:first-child){text-align:center}
.stbl td{padding:8px 6px;border-bottom:1px solid var(--border)}
.stbl td:not(:first-child){text-align:center}
.stbl tr:last-child td{border-bottom:none}
.team-td{font-weight:600}
.pts-td{font-weight:700;color:var(--accent)}
.pos-num{color:var(--muted);font-size:12px}

/* SEARCH */
.search-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.inp-row{display:flex;gap:8px;margin-bottom:10px}
.inp{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;flex:1;outline:none;width:100%}
.inp:focus{border-color:var(--accent)}
.btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.btn:active{opacity:.8}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.stat-l{font-size:11px;color:var(--muted);margin-bottom:4px}
.stat-v{font-size:24px;font-weight:800}

/* LOADER */
.loader{text-align:center;padding:50px 20px;color:var(--muted)}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ERROR */
.err{background:#3a1515;border:1px solid #7f2020;border-radius:var(--radius-sm);padding:12px;color:var(--red);font-size:13px;margin-bottom:10px}

/* GROUP HEADER */
.grp-hdr{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;padding:12px 2px 6px;border-top:1px solid var(--border);margin-top:4px}
.grp-hdr:first-child{border-top:none;padding-top:0;margin-top:0}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo"><span>Shield</span> Matrix <span style="font-size:11px;font-weight:400;color:var(--muted);margin-left:4px">WC2026</span></div>
  <button class="sync-btn" onclick="forceSync()"><span class="live-dot" id="ldot"></span><span id="sync-txt">Live</span></button>
</div>

<div class="main">
  <!-- TODAY -->
  <div class="section active" id="s-today">
    <div id="today-out"><div class="loader"><div class="spin"></div>Loading today's matches...</div></div>
  </div>
  <!-- UPCOMING -->
  <div class="section" id="s-upcoming">
    <div id="upcoming-out"><div class="loader"><div class="spin"></div>Loading fixtures...</div></div>
  </div>
  <!-- RESULTS -->
  <div class="section" id="s-results">
    <div id="results-out"><div class="loader"><div class="spin"></div>Loading results...</div></div>
  </div>
  <!-- STANDINGS -->
  <div class="section" id="s-standings">
    <div id="standings-out"><div class="loader"><div class="spin"></div>Loading standings...</div></div>
  </div>
  <!-- PREDICT -->
  <div class="section" id="s-predict">
    <div class="search-box">
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Predict Any Match</p>
      <div class="inp-row">
        <input class="inp" id="home-inp" placeholder="Home team" list="tlist">
        <input class="inp" id="away-inp" placeholder="Away team" list="tlist">
      </div>
      <datalist id="tlist"></datalist>
      <button class="btn" onclick="runPredict()">Run Prediction</button>
    </div>
    <div id="predict-out"></div>
  </div>

  <!-- LIVE -->
  <div class="section" id="s-live">
    <div class="card" style="border-left:3px solid var(--red);border-radius:0 12px 12px 0;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Live Engine</div>
          <div style="font-size:13px;color:var(--sub)">Auto-updates every 60s. Enter score manually to override.</div>
        </div>
        <div style="font-size:22px">&#128308;</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Manual In-Play Override</div>
      <div class="inp-row" style="margin-bottom:8px">
        <input class="inp" id="live-home" placeholder="Home team" list="tlist">
        <input class="inp" id="live-away" placeholder="Away team" list="tlist">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
        <input class="inp" id="live-hscore" placeholder="Home goals" type="number" min="0" value="0" style="text-align:center">
        <input class="inp" id="live-ascore" placeholder="Away goals" type="number" min="0" value="0" style="text-align:center">
        <input class="inp" id="live-min" placeholder="Minute" type="number" min="1" max="120" value="45" style="text-align:center">
      </div>
      <button class="btn" onclick="runLiveManual()">Calculate Live Prediction</button>
    </div>
    <div id="live-manual-out"></div>
    <div id="live-auto-out"><div class="loader"><div class="spin"></div>Checking for live matches...</div></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="bnav-btn active" onclick="go('today',this)">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Today
  </button>
  <button class="bnav-btn" onclick="go('live',this)" style="position:relative"><span style="position:absolute;top:6px;right:14px;width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1s infinite"></span><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>Live</button><button class="bnav-btn" onclick="go('upcoming',this)">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Upcoming
  </button>
  <button class="bnav-btn" onclick="go('results',this)">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Results
  </button>
  <button class="bnav-btn" onclick="go('standings',this)">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Standings
  </button>
  <button class="bnav-btn" onclick="go('predict',this)">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    Predict
  </button>
</nav>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// Replace with your Railway URL after deployment
// e.g. https://shield-matrix-production.up.railway.app
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:8000'
  : window.location.origin.includes('railway') || window.location.origin.includes('render')
    ? window.location.origin
    : 'http://localhost:8000';

const loaded = {};

// ── API ──────────────────────────────────────────────────────────────────────
async function req(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// ── RENDER HELPERS ────────────────────────────────────────────────────────────
function pct_color(v) { return v >= 55 ? 'hi' : v >= 42 ? 'med' : 'lo'; }

function render_pred(p, home, away) {
  const hw = p.probabilities.home_win;
  const d  = p.probabilities.draw;
  const aw = p.probabilities.away_win;
  const tot = hw + d + aw;
  const bb = p.best_bet;
  const sc = Array.isArray(p.top_scorelines) ? p.top_scorelines : JSON.parse(p.top_scorelines || '[]');
  return `
    <div class="bars">
      <div class="bar-labels">
        <span class="bl-pct">${hw}%</span>
        <span class="bl-lbl">Draw ${d}%</span>
        <span class="bl-pct">${aw}%</span>
      </div>
      <div class="bar-track">
        <div class="bs bs-h" style="width:${hw/tot*100}%"></div>
        <div class="bs bs-d" style="width:${d/tot*100}%"></div>
        <div class="bs bs-a" style="width:${aw/tot*100}%"></div>
      </div>
      <div class="bar-labels" style="margin-top:4px">
        <span class="bl-lbl" style="font-size:10px">${home}</span>
        <span class="bl-lbl" style="font-size:10px">${away}</span>
      </div>
    </div>
    <div class="mkt-grid">
      <div class="mkt"><div class="mkt-l">Over 2.5</div><div class="mkt-v ${pct_color(p.markets.over_2_5)}">${p.markets.over_2_5}%</div></div>
      <div class="mkt"><div class="mkt-l">Under 2.5</div><div class="mkt-v ${pct_color(p.markets.under_2_5)}">${p.markets.under_2_5}%</div></div>
      <div class="mkt"><div class="mkt-l">BTTS Yes</div><div class="mkt-v ${pct_color(p.markets.btts_yes)}">${p.markets.btts_yes}%</div></div>
      <div class="mkt"><div class="mkt-l">xG</div><div class="mkt-v">${(p.xg||p.mathTelemetry&&{home:p.mathTelemetry.homeExpectedValue,away:p.mathTelemetry.awayExpectedValue}||{home:'?',away:'?'}).home||p.xg?.home} – ${(p.xg||{away:'?'}).away||p.xg?.away}</div></div>
    </div>
    <div style="margin-bottom:10px">
      <div style="font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Top Scorelines</div>
      <div class="sclines">
        ${sc.map(s=>`<div class="scl"><span class="scl-s">${s.score}</span><span class="scl-p">${s.prob}%</span></div>`).join('')}
      </div>
    </div>
    <div class="bestbet">
      <div>
        <div class="bb-label">BEST BET</div>
        <div class="bb-pick">${bb.pick}</div>
        <div class="bb-pct">${bb.probability}% probability</div>
      </div>
      <div class="conf ${bb.confidence}">${bb.confidence}</div>
    </div>`;
}

function render_match_upcoming(m) {
  const p = m.prediction;
  return `<div class="mc">
    <div class="mc-meta">
      <span class="badge b-group">${m.group||'WC2026'}</span>
      <span class="badge b-upcoming">Upcoming</span>
      <span style="font-size:11px;color:var(--muted)">${m.date}</span>
    </div>
    <div class="mc-teams">
      <div class="tn tn-h">${m.home}</div>
      <div class="vs">vs</div>
      <div class="tn tn-a">${m.away}</div>
    </div>
    ${p ? render_pred(p, m.home, m.away) : ''}
  </div>`;
}

function render_match_finished(m) {
  const r = m.result || {};
  const gh = r.home ?? '?';
  const ga = r.away ?? '?';
  const win_h = gh > ga;
  const win_a = ga > gh;
  return `<div class="mc">
    <div class="mc-meta">
      <span class="badge b-group">${m.group||'WC2026'}</span>
      <span class="badge b-done">FT</span>
      <span style="font-size:11px;color:var(--muted)">${m.date}</span>
    </div>
    <div class="mc-teams">
      <div class="tn tn-h" style="${win_h?'color:var(--green)':''}">${m.home}</div>
      <div class="score">
        <div class="score-ft">${gh} – ${ga}</div>
        ${r.ht ? `<div class="score-ht">(${r.ht[0]}-${r.ht[1]} HT)</div>` : ''}
      </div>
      <div class="tn tn-a" style="${win_a?'color:var(--green)':'text-align:right'}">${m.away}</div>
    </div>
  </div>`;
}

// ── TODAY ─────────────────────────────────────────────────────────────────────
async function loadToday() {
  if (loaded.today) return;
  try {
    const d = await req('/matches/today');
    let html = '';
    if (!d.matches.length) {
      html = `<div class="card" style="text-align:center;color:var(--muted);padding:30px">
        No matches scheduled today.<br>Check <b>Upcoming</b> for next fixtures.
      </div>`;
    }
    for (const m of d.matches) {
      html += m.status === 'FINISHED' ? render_match_finished(m) : render_match_upcoming(m);
    }
    document.getElementById('today-out').innerHTML = html || '<div class="card" style="color:var(--muted);text-align:center;padding:24px">No matches today</div>';
    loaded.today = true;
  } catch(e) {
    document.getElementById('today-out').innerHTML = err_html(e);
  }
}

// ── UPCOMING ──────────────────────────────────────────────────────────────────
async function loadUpcoming() {
  if (loaded.upcoming) return;
  try {
    const d = await req('/matches/upcoming?limit=20');
    let html = '';
    for (const m of d.matches) html += render_match_upcoming(m);
    document.getElementById('upcoming-out').innerHTML = html || '<div class="card" style="color:var(--muted);text-align:center;padding:24px">No upcoming matches</div>';
    loaded.upcoming = true;
  } catch(e) {
    document.getElementById('upcoming-out').innerHTML = err_html(e);
  }
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
async function loadResults() {
  if (loaded.results) return;
  try {
    const d = await req('/matches/results');
    const byGroup = {};
    for (const m of d.results) {
      const g = m.group || 'Other';
      if (!byGroup[g]) byGroup[g] = [];
      byGroup[g].push(m);
    }
    let html = `<div class="stat-grid">
      <div class="stat"><div class="stat-l">Matches Played</div><div class="stat-v">${d.total_played}</div></div>
      <div class="stat"><div class="stat-l">Total Fixtures</div><div class="stat-v">104</div></div>
    </div>`;
    for (const [g, ms] of Object.entries(byGroup)) {
      html += `<div class="grp-hdr">${g}</div>`;
      for (const m of ms) html += render_match_finished(m);
    }
    document.getElementById('results-out').innerHTML = html;
    loaded.results = true;
  } catch(e) {
    document.getElementById('results-out').innerHTML = err_html(e);
  }
}

// ── STANDINGS ─────────────────────────────────────────────────────────────────
async function loadStandings() {
  if (loaded.standings) return;
  try {
    const d = await req('/standings');
    let html = '';
    for (const [grp, teams] of Object.entries(d.standings).sort()) {
      html += `<div class="grp-hdr">${grp}</div>
      <div class="card" style="padding:0;overflow:hidden;margin-bottom:4px">
      <table class="stbl">
        <tr><th>#</th><th style="text-align:left">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr>
        ${teams.map((t,i)=>`<tr>
          <td class="pos-num">${i+1}</td>
          <td class="team-td">${t.team_name}</td>
          <td>${t.played}</td>
          <td>${t.wins}</td>
          <td>${t.draws}</td>
          <td>${t.losses}</td>
          <td>${(t.goals_for-t.goals_against)>=0?'+'+(t.goals_for-t.goals_against):(t.goals_for-t.goals_against)}</td>
          <td class="pts-td">${t.points}</td>
        </tr>`).join('')}
      </table></div>`;
    }
    document.getElementById('standings-out').innerHTML = html;
    loaded.standings = true;
  } catch(e) {
    document.getElementById('standings-out').innerHTML = err_html(e);
  }
}

// ── PREDICT ───────────────────────────────────────────────────────────────────
async function runPredict() {
  const h = document.getElementById('home-inp').value.trim();
  const a = document.getElementById('away-inp').value.trim();
  if (!h || !a) return;
  document.getElementById('predict-out').innerHTML = '<div class="loader"><div class="spin"></div>Calculating...</div>';
  try {
    const p = await req(`/predict/${encodeURIComponent(h)}/${encodeURIComponent(a)}`);
    document.getElementById('predict-out').innerHTML = `
      <div class="mc">
        <div class="mc-meta"><span class="badge b-group">Custom</span></div>
        <div class="mc-teams">
          <div class="tn tn-h">${p.home_team}</div>
          <div class="vs">vs</div>
          <div class="tn tn-a">${p.away_team}</div>
        </div>
        ${render_pred(p, p.home_team, p.away_team)}
      </div>`;
  } catch(e) {
    document.getElementById('predict-out').innerHTML = err_html(e);
  }
}

// ── SYNC ──────────────────────────────────────────────────────────────────────
async function forceSync() {
  document.getElementById('sync-txt').textContent = 'Syncing...';
  document.getElementById('ldot').style.background = 'var(--amber)';
  try {
    await req('/sync');
    // Clear cache so next tab visit re-fetches
    Object.keys(loaded).forEach(k => delete loaded[k]);
    await loadToday();
    document.getElementById('sync-txt').textContent = 'Live';
    document.getElementById('ldot').style.background = 'var(--green)';
  } catch(e) {
    document.getElementById('sync-txt').textContent = 'Error';
    document.getElementById('ldot').style.background = 'var(--red)';
  }
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function go(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('s-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'today')     loadToday();
  if (name === 'upcoming')  loadUpcoming();
  if (name === 'results')   loadResults();
  if (name === 'standings') loadStandings();
  if (name === 'live') { loadLive(); if(!liveTimer) liveTimer = setInterval(loadLive, 60000); } else { if(liveTimer){clearInterval(liveTimer);liveTimer=null;} }
}

// ── TEAMS LIST ────────────────────────────────────────────────────────────────
const TEAMS = ['Mexico','South Korea','Czech Republic','South Africa','Switzerland','Canada','Bosnia & Herzegovina','Qatar','Brazil','Scotland','Morocco','Haiti','United States','Australia','Türkiye','Paraguay','Spain','Netherlands','Sweden','Tunisia','Germany','Japan','Belgium','Egypt','Portugal','Congo DR','Uzbekistan','Colombia','Argentina','Algeria','Austria','Jordan','France','Senegal','Norway','Iraq','England','Croatia','Ghana','Panama','New Zealand','Saudi Arabia','Uruguay','Iran','Ivory Coast','Ecuador','Cape Verde','Serbia'];
const dl = document.getElementById('tlist');
TEAMS.forEach(t => { const o = document.createElement('option'); o.value = t; dl.appendChild(o); });

function err_html(e) {
  return `<div class="err">⚠️ Could not connect to backend.<br><small>Make sure the server is running.<br>${e.message}</small></div>`;
}


// LIVE ENGINE
let liveTimer = null;

async function loadLive() {
  try {
    const d = await req('/live');
    let html = '';
    if (!d.matches || d.matches.length === 0) {
      html = '<div class="card" style="text-align:center;color:var(--muted);padding:30px">No live WC2026 matches right now.<br><br>Use manual override above to simulate any in-play scenario.</div>';
    } else {
      for (const m of d.matches) html += renderLiveCard(m);
    }
    document.getElementById('live-auto-out').innerHTML = html;
  } catch(e) {
    document.getElementById('live-auto-out').innerHTML = '<div class="card" style="text-align:center;color:var(--muted);padding:20px">Use manual override above to test live predictions.</div>';
  }
}

function renderLiveCard(m) {
  const p = m.prediction;
  const hw = p.probabilities.home_win;
  const d  = p.probabilities.draw;
  const aw = p.probabilities.away_win;
  const tot = hw + d + aw;
  const bb = p.best_bet;
  return `<div class="mc" style="border-color:var(--red)">
    <div class="mc-meta">
      <span class="badge" style="background:#3a1515;color:var(--red)">LIVE ${m.minute}'</span>
      <span style="font-size:11px;color:var(--muted)">${p.phase}</span>
    </div>
    <div class="mc-teams">
      <div class="tn tn-h">${m.home}</div>
      <div class="score" style="border-color:var(--red)">
        <div class="score-ft" style="color:var(--red)">${m.home_score} - ${m.away_score}</div>
      </div>
      <div class="tn tn-a">${m.away}</div>
    </div>
    <div style="font-size:12px;color:var(--amber);margin-bottom:10px;text-align:center">${p.momentum}</div>
    <div class="bars">
      <div class="bar-labels">
        <span class="bl-pct">${hw}%</span>
        <span class="bl-lbl">Draw ${d}%</span>
        <span class="bl-pct">${aw}%</span>
      </div>
      <div class="bar-track">
        <div class="bs bs-h" style="width:${hw/tot*100}%"></div>
        <div class="bs bs-d" style="width:${d/tot*100}%"></div>
        <div class="bs bs-a" style="width:${aw/tot*100}%"></div>
      </div>
    </div>
    <div class="mkt-grid">
      <div class="mkt"><div class="mkt-l">Over 2.5</div><div class="mkt-v ${pct_color(p.markets.over_2_5)}">${p.markets.over_2_5}%</div></div>
      <div class="mkt"><div class="mkt-l">Under 2.5</div><div class="mkt-v ${pct_color(p.markets.under_2_5)}">${p.markets.under_2_5}%</div></div>
      <div class="mkt"><div class="mkt-l">BTTS Yes</div><div class="mkt-v ${pct_color(p.markets.btts_yes)}">${p.markets.btts_yes}%</div></div>
      <div class="mkt"><div class="mkt-l">Remaining xG</div><div class="mkt-v">${p.remaining_xg.home} - ${p.remaining_xg.away}</div></div>
    </div>
    <div class="bestbet">
      <div>
        <div class="bb-label">LIVE BEST BET</div>
        <div class="bb-pick">${bb.pick}</div>
        <div class="bb-pct">${bb.probability}% probability</div>
      </div>
      <div class="conf ${bb.confidence}">${bb.confidence}</div>
    </div>
  </div>`;
}

async function runLiveManual() {
  const home = document.getElementById('live-home').value.trim();
  const away = document.getElementById('live-away').value.trim();
  const hs = document.getElementById('live-hscore').value || 0;
  const as2 = document.getElementById('live-ascore').value || 0;
  const min = document.getElementById('live-min').value || 45;
  if (!home || !away) return;
  document.getElementById('live-manual-out').innerHTML = '<div class="loader"><div class="spin"></div>Calculating...</div>';
  try {
    const p = await req('/live/predict?home=' + encodeURIComponent(home) + '&away=' + encodeURIComponent(away) + '&home_score=' + hs + '&away_score=' + as2 + '&minute=' + min);
    document.getElementById('live-manual-out').innerHTML = renderLiveCard({
      home: p.home_team, away: p.away_team,
      home_score: p.current_score.home, away_score: p.current_score.away,
      minute: p.minute, prediction: p
    });
  } catch(e) {
    document.getElementById('live-manual-out').innerHTML = err_html(e);
  }
}

// Init
loadToday();
</script>
